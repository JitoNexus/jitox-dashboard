<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Wallet Loading Animation</title>
    <link rel="stylesheet" href="loading.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</head>
<body>
    <div class="loading-container">
        <div class="wallet">
            <div class="wallet-body">
                <div class="wallet-front"></div>
                <div class="wallet-middle"></div>
                <div class="wallet-back"></div>
            </div>
            <div class="coins-container">
                <div class="coin sol">
                    <div class="coin-inner">SOL</div>
                </div>
                <div class="coin eth">
                    <div class="coin-inner">ETH</div>
                </div>
            </div>
        </div>
        <div class="particles"></div>
        <div class="loading-text">
            <span class="text-gradient">Loading Your Crypto Universe</span>
            <div class="progress-bar">
                <div class="progress"></div>
            </div>
        </div>
    </div>
    <script src="loading.js"></script>
</body>
</html>
