<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JitoX Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="cookie-warning.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.min.js"></script>
</head>
<body class="not-logged">
    <!-- Login Section -->
    <div class="login-section">
        <div class="login-container">
            <h2>Welcome to JitoX Dashboard</h2>
            <p>Access the dashboard or log in to save your preferences</p>
            <div class="login-buttons">
                <button class="continue-button" onclick="continueWithoutLogin()">
                    <i class="fas fa-arrow-right"></i>
                    Continue to Dashboard
                </button>
                <div class="or-divider">
                    <span>or</span>
                </div>
                <button class="telegram-login-button" disabled title="Coming soon">
                    <i class="fab fa-telegram"></i>
                    Log in with Telegram (Coming Soon)
                </button>
            </div>
            <div class="login-info">
                <p>Secure access powered by JitoX</p>
                <div class="secure-badge">
                    <i class="fas fa-shield-alt"></i> Secure Connection
                </div>
            </div>
        </div>
    </div>

    <!-- Dashboard Container -->
    <div class="dashboard-container hidden">
        <div class="dashboard-header">
            <h1 class="cyber-title">JitoX Dashboard</h1>
            <div class="connection-status">
                <div class="status-indicator"></div>
                <span class="status-text">Connecting...</span>
            </div>
        </div>
        <!-- Add your dashboard content here -->
    </div>

    <script>
        function continueWithoutLogin() {
            document.body.classList.remove('not-logged');
            document.querySelector('.login-section').classList.add('hidden');
            document.querySelector('.dashboard-container').classList.remove('hidden');
            initializeDashboard();
        }

        // Run when the page loads
        window.addEventListener('load', () => {
            // Check if user was previously in the dashboard
            if (sessionStorage.getItem('dashboardAccessed')) {
                continueWithoutLogin();
            }
        });
    </script>
    <script src="script.js"></script>
</body>
</html>
