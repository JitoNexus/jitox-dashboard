<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JitoX Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-widget.js?22"></script>
    <script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.min.js"></script>
</head>
<body class="not-logged">
    <!-- Login Section -->
    <div class="login-section">
        <div class="login-container">
            <h2>Welcome to JitoX Dashboard</h2>
            <p>Please log in with Telegram to continue</p>
            <script async src="https://telegram.org/js/telegram-widget.js?22" 
                data-telegram-login="jitoxai_bot" 
                data-size="large" 
                data-radius="8" 
                data-onauth="onTelegramAuth(user)"
                data-request-access="write"
                data-userpic="true"
                data-lang="en">
            </script>
            <div class="login-info">
                <p>Secure login powered by Telegram</p>
                <div class="secure-badge">
                    <i class="fas fa-shield-alt"></i> Secure Connection
                </div>
            </div>
        </div>
    </div>

    <!-- Dashboard Container -->
    <div class="dashboard-container hidden">
        <!-- Rest of your dashboard content -->
    </div>

    <script src="script.js"></script>
</body>
</html>
