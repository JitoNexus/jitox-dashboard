<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JitoX Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <!-- Loading Screen -->
    <div class="loading-overlay">
        <div class="loading-content">
            <div class="loading-text">Initializing JitoX...</div>
            <div class="cyber-spinner"></div>
            <div class="loading-progress">
                <div class="progress-bar"></div>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <div class="cyber-frame">
            <!-- Rest of your existing content -->
            <h1>JitoX</h1>
            
            <!-- Navigation -->
            <nav class="cyber-nav">
                <button class="cyber-button" data-tab="statistics">Statistics</button>
                <button class="cyber-button" data-tab="ai">AI Dashboard</button>
                <button class="cyber-button" data-tab="leaderboard">Leaderboard</button>
                <button class="cyber-button" data-tab="analytics">Deep Analytics</button>
                <button class="cyber-button" data-tab="alerts">Live Alerts</button>
                <button class="cyber-button" data-tab="strategy">Strategy Hub</button>
            </nav>

            <!-- Statistics Section -->
            <section class="statistics-section">
                <!-- Your existing statistics content -->
            </section>

            <!-- AI Dashboard Section -->
            <section class="ai-section">
                <!-- Your existing AI dashboard content -->
            </section>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
