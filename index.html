<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JitoX Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="loading">
    <!-- Enhanced Loading Screen -->
    <div class="loading-overlay">
        <div class="cyber-grid"></div>
        <div class="loading-content">
            <div class="loading-logo">
                <div class="logo-hexagon"></div>
                <span class="logo-text">JitoX</span>
            </div>
            <div class="loading-text">System Initialization</div>
            <div class="loading-status">
                <div class="status-item">
                    <i class="fas fa-microchip"></i>
                    <span>Initializing Core Systems</span>
                </div>
                <div class="status-item">
                    <i class="fas fa-network-wired"></i>
                    <span>Establishing Network Connection</span>
                </div>
                <div class="status-item">
                    <i class="fas fa-database"></i>
                    <span>Loading Data Structures</span>
                </div>
            </div>
            <div class="loading-progress">
                <div class="progress-bar"></div>
                <div class="progress-percentage">0%</div>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <div class="cyber-frame">
            <!-- Rest of your existing content -->
            <h1>JitoX</h1>
            
            <!-- Navigation -->
            <nav class="cyber-nav">
                <button class="cyber-button" data-tab="statistics">Statistics</button>
                <button class="cyber-button" data-tab="ai">AI Dashboard</button>
                <button class="cyber-button" data-tab="leaderboard">Leaderboard</button>
                <button class="cyber-button" data-tab="analytics">Deep Analytics</button>
                <button class="cyber-button" data-tab="alerts">Live Alerts</button>
                <button class="cyber-button" data-tab="strategy">Strategy Hub</button>
            </nav>

            <!-- Statistics Section -->
            <section class="statistics-section">
                <!-- Your existing statistics content -->
            </section>

            <!-- AI Dashboard Section -->
            <section class="ai-section">
                <!-- Your existing AI dashboard content -->
            </section>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
