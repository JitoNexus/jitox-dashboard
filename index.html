<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JitoX Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
</head>
<body>
    <!-- Loading Screen -->
    <div class="loading-container">
        <div id="particles" class="particles"></div>
        
        <div class="wallet">
            <div class="wallet-body">
                <div class="wallet-front"></div>
                <div class="wallet-middle"></div>
                <div class="wallet-back"></div>
                
                <div class="coins-container">
                    <div class="coin sol">
                        <div class="coin-inner">SOL</div>
                    </div>
                    <div class="coin eth">
                        <div class="coin-inner">ETH</div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="loading-text">
            <div class="text-gradient">Loading Your Crypto Dashboard</div>
            <div class="progress-bar">
                <div class="progress"></div>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <h1>Welcome to Your Crypto Dashboard</h1>
        <!-- Add your dashboard content here -->
    </div>

    <script src="script.js"></script>
</body>
</html>
